            httpGet:
              path: {{ $svc2.probe.readiness.path }}
              port: {{ $svc2.service.port }}
            initialDelaySeconds: {{ $svc2.probe.readiness.initialDelaySeconds }}
            periodSeconds: {{ $svc2.probe.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml $svc2.resources | nindent 12 }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ $svc2.service.port | quote }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secret
                optional: true
{{- end }}
