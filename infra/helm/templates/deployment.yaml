  {{- end }}
spec:
  {{- if not .Values.canary.enabled }}
  replicas: {{ $svc2.replicaCount }}
  {{- else }}
  replicas: 1
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
