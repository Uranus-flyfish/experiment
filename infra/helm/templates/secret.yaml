apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app: nekocafe
    environment: {{ .Values.global.environment }}
type: Opaque
data:
  # 示例：以下值应从外部密钥管理系统注入（如 Vault / Sealed Secrets）
  # 严禁在此处硬编码明文密钥
  {{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ $val | b64enc | quote }}
  {{- end }}
  # 实际使用时，通过以下方式注入：
  # 1. GitHub Secrets → CI/CD Pipeline → helm --set secrets.DB_PASSWORD=<DB_PASSWORD>
  # 2. External Secrets Operator → AWS Secrets Manager / HashiCorp Vault
  # 3. Sealed Secrets → 加密存储于 Git 仓库
stringData:
  # 开发环境默认值（仅用于本地开发，生产环境覆盖）
  {{- if eq .Values.global.environment "dev" }}
  DB_PASSWORD: "nekocafe_dev_password"
  JWT_SECRET: "change-me-in-real-env"
  REDIS_PASSWORD: ""
  {{- end }}
