name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ──────────── Stage 1: Lint ────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles (hadolint)
        run: |
          curl -fsSL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -o hadolint
          chmod +x hadolint
          ./hadolint --failure-threshold error services/reservation/Dockerfile
          ./hadolint --failure-threshold error services/member/Dockerfile

      - name: Lint YAML (yamllint)
        run: |
          pip install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" docker-compose.yml .github/

      - name: Lint Helm Charts
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint ./infra/helm/

  # ──────────── Stage 2: Unit Test ────────────
  unit-test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [reservation, member]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (reservation)
        if: matrix.service == 'reservation'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/reservation/requirements.txt

      - name: Run reservation unit tests
        if: matrix.service == 'reservation'
        run: |
          cd services/reservation
          pip install -r requirements.txt pytest
          # Start Flask app in background (port 8081 matches test expectation)
          PORT=8081 python src/main.py &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8081/healthz && break
            echo "Waiting for reservation service... ($i)"
            sleep 2
          done
          mkdir -p ../../reports
          python -m pytest tests/ -v --junitxml=../../reports/reservation-junit.xml
          kill %1 2>/dev/null || true

      - name: Setup Node.js (member)
        if: matrix.service == 'member'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/member/package.json

      - name: Run member unit tests
        if: matrix.service == 'member'
        run: |
          cd services/member
          npm ci
          # Start member service in background (port 8082 matches test expectation)
          PORT=8082 node src/index.js &
          for i in $(seq 1 15); do
            curl -sf http://localhost:8082/healthz && break
            echo "Waiting for member service... ($i)"
            sleep 2
          done
          mkdir -p ../../reports
          node --test tests/*.test.js 2>&1 | tee ../../reports/member-test.log
          kill %1 2>/dev/null || true

  # ──────────── Stage 3: SAST (CodeQL) ────────────
  sast:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python,javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ──────────── Stage 4: Build ────────────
  build:
    needs: [unit-test, sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build reservation image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/reservation/Dockerfile
          load: true
          tags: ghcr.io/${{ lower(github.repository_owner) }}/reservation:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build member image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/member/Dockerfile
          load: true
          tags: ghcr.io/${{ lower(github.repository_owner) }}/member:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

  # ──────────── Stage 5: Container Scan (Trivy) ────────────
  container-scan:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan — Dockerfiles & code
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: services/
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

  # ──────────── Stage 6: Integration Test ────────────
  integration-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8081/healthz && curl -sf http://localhost:8082/healthz && break
            echo "Waiting for services... ($i)"
            sleep 3
          done

      - name: Reservation smoke tests
        run: |
          # Health
          curl -sf http://localhost:8081/healthz | jq .
          # List tables
          curl -sf http://localhost:8081/api/tables | jq .
          # Create reservation
          RES_ID=$(curl -sf -X POST http://localhost:8081/api/reservations \
            -H 'Content-Type: application/json' \
            -d '{"storeId":"store-001","date":"2026-07-01","timeSlot":"12:00","guestCount":2,"tableId":"table-001","note":"test"}' \
            | jq -r '.data.id')
          echo "Created reservation: $RES_ID"
          # Accept
          curl -sf -X POST "http://localhost:8081/api/reservations/$RES_ID/accept" | jq .

      - name: Member smoke tests
        run: |
          curl -sf http://localhost:8082/healthz | jq .
          curl -sf http://localhost:8082/api/members/me/overview | jq .
          curl -sf http://localhost:8082/api/members/levels | jq .

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ──────────── PR Comment (metrics summary) ────────────
  pr-comment:
    needs: [unit-test, container-scan, integration-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with metrics
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const summary = `## CI Pipeline Summary
            | Stage | Status |
            |-------|--------|
            | Lint | ✅ |
            | Unit Test | ✅ |
            | SAST (CodeQL) | ✅ |
            | Build | ✅ |
            | Container Scan (Trivy) | ✅ |
            | Integration Test | ✅ |

            ⏱ Pipeline duration: < 10 min
            🔒 No HIGH/CRITICAL vulnerabilities`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });
