name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      canary_pct:
        description: "Canary traffic percentage"
        required: false
        default: "5"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_RESERVATION: ghcr.io/uranus-flyfish/reservation
  IMAGE_MEMBER: ghcr.io/uranus-flyfish/member

jobs:
  # ──────────── Build & Push ────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "version=$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push reservation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/reservation/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_RESERVATION }}:latest
            ${{ env.IMAGE_RESERVATION }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push member
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/member/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_MEMBER }}:latest
            ${{ env.IMAGE_MEMBER }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────── Deploy to Dev (simulated) ────────────
  deploy-dev:
    needs: build-push
    runs-on: ubuntu-latest
    if: inputs.environment == 'dev' || github.event_name == 'push'
    steps:
      - name: Simulate deploy to DEV
        run: |
          echo "=========================================="
          echo "  Deploying to DEV environment"
          echo "=========================================="
          echo ""
          echo "  Images:"
          echo "    reservation: ${{ env.IMAGE_RESERVATION }}:${{ needs.build-push.outputs.version }}"
          echo "    member:      ${{ env.IMAGE_MEMBER }}:${{ needs.build-push.outputs.version }}"
          echo ""
          echo "  Strategy: Helm upgrade --install (dev defaults)"
          echo "  Namespace: dev"
          echo "  Replicas: 1 (dev-scaled)"
          echo ""
          echo "  [SIMULATED] helm upgrade --install nekocafe ./infra/helm \\"
          echo "    --namespace dev --create-namespace \\"
          echo "    -f values-dev.yaml"
          echo ""
          echo "  ✅ DEV deployment successful (simulated)"

  # ──────────── Canary Deploy to Staging (simulated) ────────────
  deploy-staging-canary:
    needs: build-push
    runs-on: ubuntu-latest
    if: inputs.environment == 'staging'
    steps:
      - name: Simulate canary deploy (5%)
        run: |
          echo "=========================================="
          echo "  Canary Deploy to STAGING (5% traffic)"
          echo "=========================================="
          echo ""
          echo "  [SIMULATED] helm upgrade --install nekocafe-canary ./infra/helm \\"
          echo "    --namespace staging --create-namespace \\"
          echo "    -f values-staging.yaml \\"
          echo "    --set canary.enabled=true --set canary.weight=5"
          echo ""

      - name: Simulate wait & monitor
        run: |
          echo "  ⏳ Waiting 10s for canary metrics..."
          sleep 10
          echo "  📊 Error rate: 0.3%  (threshold: <1%)"
          echo "  📊 P95 latency: 120ms  (threshold: <500ms)"
          echo "  ✅ Health check passed"

      - name: Simulate promote to 100%
        run: |
          echo ""
          echo "  [SIMULATED] helm upgrade --install nekocafe ./infra/helm \\"
          echo "    --namespace staging --create-namespace \\"
          echo "    -f values-staging.yaml \\"
          echo "    --set canary.enabled=false"
          echo ""
          echo "  ✅ STAGING canary → 100% promoted (simulated)"

  # ──────────── Blue-Green Deploy to Prod (simulated) ────────────
  deploy-prod-blue-green:
    needs: build-push
    runs-on: ubuntu-latest
    if: inputs.environment == 'prod'
    steps:
      - name: Simulate green deploy
        run: |
          echo "=========================================="
          echo "  Blue-Green Deploy to PROD"
          echo "=========================================="
          echo ""
          echo "  Current active: BLUE"
          echo "  Deploying:      GREEN"
          echo ""
          echo "  [SIMULATED] helm upgrade --install nekocafe-green ./infra/helm \\"
          echo "    --namespace prod --create-namespace \\"
          echo "    -f values-prod.yaml \\"
          echo "    --set deployment.color=green"
          echo ""

      - name: Simulate green health check
        run: |
          echo "  🔍 Verifying green health..."
          sleep 5
          echo "  ✅ Green pods healthy"

      - name: Simulate traffic switch
        run: |
          echo ""
          echo "  🔄 Switching traffic: BLUE → GREEN"
          echo "  [SIMULATED] kubectl patch svc --selector color=green"
          echo ""

      - name: Simulate monitor & cleanup
        run: |
          echo "  ⏳ Monitoring post-switch (simulated)..."
          sleep 5
          echo "  📊 P95 CPU: 120m"
          echo "  ✅ No errors detected"
          echo ""
          echo "  [SIMULATED] helm uninstall nekocafe-blue -n prod"
          echo ""
          echo "  🎉 PROD blue-green deployment successful (simulated)"
